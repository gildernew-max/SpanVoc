<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Your AP Exam Edge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070d;--surf:#0f0f1a;--card:#141420;--card2:#1a1a28;--bdr:#252535;--bdr2:#32324a;
  --txt:#eeeef5;--mut:#5a5a7a;--soft:#9090b8;
  --a0:#f0c040;--a1:#4fc3f7;--a2:#a78bfa;--a3:#34d399;--a4:#fb7185;--a5:#c084fc;
  --gold:#f0c040;--glow:rgba(240,192,64,0.15);
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;overflow-x:hidden}
button,input,textarea{font-family:inherit}
button{cursor:pointer}
a{color:inherit;text-decoration:none}

/* ── HERO ── */
.hero{
  position:relative;padding:2.5rem 1.5rem 2rem;
  background:linear-gradient(160deg,#0a0a18 0%,#0f0f20 60%,#070712 100%);
  border-bottom:1px solid var(--bdr);overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-60px;left:-60px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(240,192,64,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;bottom:-40px;right:-40px;width:300px;height:300px;
  background:radial-gradient(circle,rgba(79,195,247,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.hero-inner{max-width:820px;margin:0 auto;position:relative;z-index:1}
.hero-badge{
  display:inline-block;font-family:monospace;font-size:10px;letter-spacing:3px;
  text-transform:uppercase;color:var(--a0);background:rgba(240,192,64,0.1);
  border:1px solid rgba(240,192,64,0.25);border-radius:2px;padding:4px 10px;margin-bottom:14px;
}
.hero-title{
  font-family:monospace;font-size:clamp(36px,8vw,64px);font-weight:900;
  letter-spacing:-1px;line-height:0.95;color:var(--txt);
}
.hero-title .apex{color:var(--a0);letter-spacing:2px}
.hero-sub{margin-top:12px;font-size:15px;color:var(--soft);font-weight:300;max-width:480px;line-height:1.6}
.hero-stats{display:flex;gap:24px;margin-top:20px}
.hero-stat{text-align:center}
.hero-stat-num{font-family:monospace;font-size:22px;font-weight:700;color:var(--a0)}
.hero-stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:2px}

/* ── LAYOUT ── */
.page{max-width:820px;margin:0 auto;padding:0 1rem 3rem}
#app{max-width:820px;margin:0 auto}

/* ── TABS ── */
.tab-bar{display:flex;border-bottom:1px solid var(--bdr);padding:0 1rem;overflow-x:auto;background:var(--surf)}
.tab{
  background:none;border:none;border-bottom:2px solid transparent;
  padding:14px 18px;font-size:11px;font-family:monospace;letter-spacing:2px;
  text-transform:uppercase;color:var(--mut);white-space:nowrap;transition:color .15s;
}
.tab.active{border-bottom-color:var(--a0);color:var(--a0);font-weight:700}
.tab:hover{color:var(--soft)}

/* ── CONTENT AREA ── */
.content{padding:1.5rem 1rem}

/* ── BUTTONS ── */
.btn{background:transparent;border:1px solid var(--bdr2);border-radius:4px;padding:9px 18px;font-size:13px;color:var(--txt);transition:all .15s}
.btn:hover{border-color:var(--soft);background:rgba(255,255,255,0.04)}
.btn-gold{
  background:linear-gradient(135deg,rgba(240,192,64,0.15),rgba(240,192,64,0.08));
  border:1px solid rgba(240,192,64,0.4);color:var(--a0);font-weight:600;
  font-size:14px;padding:12px 24px;border-radius:4px;letter-spacing:.5px;
  transition:all .2s;
}
.btn-gold:hover{background:linear-gradient(135deg,rgba(240,192,64,0.25),rgba(240,192,64,0.15));border-color:var(--a0)}
.btn-full{display:block;width:100%;text-align:center}
.btn-danger{color:var(--a4);border-color:rgba(251,113,133,0.25);font-size:12px;padding:5px 12px}
.btn-danger:hover{background:rgba(251,113,133,0.08)}
.btn-notion{color:var(--a2);border-color:rgba(167,139,250,0.35);font-size:12px;padding:8px 14px;display:flex;align-items:center;gap:6px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:16px 20px}
.card-accent{border-top:2px solid}
.session-card{
  border-left:3px solid;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:8px;padding:14px 18px;cursor:pointer;
  border-radius:6px;transition:background .15s;
}
.session-card:hover{background:var(--card2)}

/* ── UNIT TILES ── */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:4px}
.unit-tile{
  border:1px solid var(--bdr);border-radius:8px;padding:20px;cursor:pointer;
  position:relative;overflow:hidden;transition:all .2s;background:var(--card);
}
.unit-tile:hover{border-color:var(--bdr2);background:var(--card2);transform:translateY(-1px)}
.unit-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.unit-tile-num{
  font-family:monospace;font-size:52px;font-weight:900;line-height:1;
  opacity:.08;position:absolute;top:10px;right:14px;letter-spacing:-2px;
}
.unit-tile-label{font-family:monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.unit-tile-name{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:6px;line-height:1.3}
.unit-tile-tag{font-size:11px;color:var(--soft)}
.unit-tile-count{
  display:inline-block;font-family:monospace;font-size:9px;letter-spacing:1px;
  padding:3px 8px;border-radius:2px;margin-top:8px;
}

/* ── SECTION HEADERS ── */
.section-header{display:flex;align-items:baseline;gap:12px;padding-bottom:10px;border-bottom:1px solid var(--bdr);margin:28px 0 14px}
.section-num{font-family:monospace;font-size:36px;font-weight:900;opacity:.1;line-height:1}
.section-name{font-family:monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* ── FORMULA BOXES ── */
.formula{
  background:#0a0a14;border:1px solid var(--bdr);border-radius:2px;
  padding:10px 16px;font-family:monospace;font-size:13px;letter-spacing:.5px;margin:6px 0;
}
.formula span{color:var(--mut);font-size:11px}

/* ── LABELS ── */
.mono-label{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mut)}

/* ── FLASHCARD ── */
.fc-card{
  background:var(--card);border:1px solid var(--bdr);border-radius:6px;
  padding:18px;min-height:130px;cursor:pointer;display:flex;flex-direction:column;
  justify-content:center;transition:all .2s;position:relative;overflow:hidden;
}
.fc-card:hover{background:var(--card2);transform:translateY(-1px)}
.fc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}

/* ── QUIZ ── */
.quiz-opt{
  padding:11px 16px;border-radius:4px;border:1px solid var(--bdr);
  cursor:pointer;font-size:13px;color:var(--soft);transition:all .15s;margin-bottom:8px;
}
.quiz-opt:hover:not(.locked){background:rgba(255,255,255,0.03);border-color:var(--bdr2)}

/* ── CHAT ── */
.chat-bubble-user{
  background:rgba(79,195,247,0.1);border:1px solid rgba(79,195,247,0.25);
  color:#4fc3f7;padding:11px 16px;border-radius:6px;font-size:13px;line-height:1.7;max-width:78%;
}
.chat-bubble-ai{
  background:var(--card);border:1px solid var(--bdr);
  color:var(--soft);padding:11px 16px;border-radius:6px;font-size:13px;line-height:1.7;max-width:78%;
}

/* ── SETUP SCREEN ── */
.setup-box{max-width:480px;margin:4rem auto;padding:0 1rem}
.setup-steps{background:rgba(79,195,247,0.05);border:1px solid rgba(79,195,247,0.2);border-radius:6px;padding:14px 18px;margin-bottom:18px;font-size:12px;color:var(--soft);line-height:1.9}

/* ── MISC ── */
.status-err{color:var(--a4);font-size:13px;padding:6px 0}
.spinner{width:16px;height:16px;border:2px solid var(--bdr2);border-top-color:var(--a1);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
ul.bullets{padding:0;list-style:none;margin:0}
ul.bullets li{padding:4px 0 4px 18px;position:relative;color:var(--soft);font-size:12px;line-height:1.65;border-bottom:1px solid rgba(255,255,255,.025)}
ul.bullets li::before{content:'→';position:absolute;left:0;color:var(--mut);font-size:10px;top:5px}
.notion-export{background:#08080f;border:1px solid rgba(167,139,250,0.25);border-radius:4px;padding:10px;font-family:monospace;font-size:11px;color:var(--soft);width:100%;height:140px;resize:none;outline:none;margin-top:8px}
.exam-tip{background:rgba(240,192,64,0.05);border:1px solid rgba(240,192,64,0.2);border-left:3px solid var(--a0);border-radius:4px;padding:14px 18px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
</style>
</head>

<script>
const MODEL='claude-sonnet-4-20250514';
let API_KEY=localStorage.getItem('apex-key')||'';

const ACCENT=['#f0c040','#4fc3f7','#a78bfa','#34d399','#fb7185','#c084fc'];
const ac=i=>ACCENT[i%ACCENT.length];

const UNITS=[
  {id:1,label:'Basic Concepts',color:'#f0c040',exam:'5–10%',topics:['scarcity','opportunity cost','ppc','production possibilities','comparative advantage','supply','demand','trade']},
  {id:2,label:'Economic Indicators',color:'#4fc3f7',exam:'12–17%',topics:['gdp','gross domestic product','unemployment','inflation','cpi','business cycle','recession','nominal','real','deflator','labor force']},
  {id:3,label:'AS/AD & Fiscal Policy',color:'#a78bfa',exam:'17–27%',topics:['aggregate demand','aggregate supply','fiscal','multiplier','mpc','mps','government spending','tax','recessionary gap','inflationary gap','sras','lras','ad']},
  {id:4,label:'Financial Sector',color:'#34d399',exam:'18–23%',topics:['money','banking','t-account','reserve','money multiplier','monetary policy','federal reserve','fed','interest rate','loanable funds','m1','m2','bond','open market','discount rate','fractional reserve','deposit']},
  {id:5,label:'Long-Run Policy',color:'#fb7185',exam:'20–30%',topics:['phillips curve','long run','crowding out','quantity theory','mv=py','stagflation','lrpc','srpc','natural rate','economic growth','lras shift']},
  {id:6,label:'Open Economy & Forex',color:'#c084fc',exam:'10–13%',topics:['foreign exchange','forex','exchange rate','balance of payments','current account','capital account','imports','exports','net exports','currency','appreciation','depreciation']},
];

const UNIT_OVERVIEWS=[
  {id:1,emoji:'🧩',tagline:'The foundation everything else is built on.',intro:'Before you can understand why the stock market moves or what the Fed does, you need to get comfortable with a few big ideas. Unit 1 is all about those fundamentals — and once these click, the rest of AP Macro starts to make a lot more sense.',sections:[{title:'Scarcity — the reason economics exists',body:'Here\'s the core problem: people want more than they can have. Resources — time, money, land, labor — are limited. Wants are not. That gap between what we have and what we want is called **scarcity**, and it\'s why every decision has a cost. Even choosing to watch Netflix instead of studying has a cost — it\'s not the subscription fee, it\'s what you gave up.'},{title:'Opportunity cost — the real price of everything',body:'Every time you choose one thing, you give up another. That thing you give up is your **opportunity cost**. If you spend $100 on shoes, your opportunity cost might be the concert tickets you didn\'t buy. The true cost of any decision isn\'t just what you paid — it\'s what you didn\'t do instead.'},{title:'The PPC — a picture of what\'s possible',body:'The **Production Possibilities Curve** shows the maximum output a country can produce with the resources it has. Points on the curve = efficient. Points inside = wasting resources. Points outside = currently impossible. When the curve shifts outward, that\'s **economic growth**.'},{title:'Comparative advantage — why trade makes everyone richer',body:'Even if one country is better at producing everything, it still makes sense to trade. Why? Because you should focus on what you\'re **relatively** better at. Countries specialize where they have the lowest opportunity cost, then trade. Everyone ends up with more.'},{title:'Supply & demand — how markets find their price',body:'When price goes up, buyers want less and sellers want more. When they meet in the middle, you get **equilibrium**. Shifters like income, preferences, input costs, and technology move the whole curve. Master these shifters and you can predict what happens in almost any market.'}],examTip:'Unit 1 is 5–10% of the exam but the concepts run through everything. Opportunity cost, PPC shifts, and comparative advantage appear in FRQs constantly.'},
  {id:2,emoji:'📊',tagline:'How do we know if the economy is healthy?',intro:'You can\'t fix what you can\'t measure. Unit 2 is about the scoreboard — the tools economists use to take the economy\'s temperature. GDP, unemployment, inflation — these are the numbers policymakers, investors, and news anchors obsess over every single day.',sections:[{title:'GDP — the economy\'s report card',body:'**Gross Domestic Product** is the total value of everything a country produces in a year. GDP = C + Ig + G + Xn. Notice what\'s NOT included: used goods, financial transactions like stocks, and underground economy activity. **Real GDP** adjusts for inflation; nominal doesn\'t. Always use real GDP to compare across years.'},{title:'Unemployment — not everyone counts',body:'You\'re only "unemployed" if you\'re actively looking for work. Stop looking and you fall out of the labor force — which makes the rate go *down*. Three types: **frictional** (between jobs), **structural** (skills mismatch), and **cyclical** (recession-driven). The natural rate = frictional + structural.'},{title:'Inflation — when your dollar buys less',body:'Inflation is a general rise in the price level. The main measure is the **CPI**. Who wins? **Borrowers** — they repay loans with cheaper dollars. Who loses? **Lenders and savers** — their money loses purchasing power.'},{title:'The business cycle — boom and bust',body:'Economies expand, peak, contract, and trough in a repeating cycle. A **recessionary gap** means output is below potential — high unemployment. An **inflationary gap** means the economy is running hot. Where you are in the cycle determines which policy tools make sense.'}],examTip:'Unit 2 is 12–17% of the exam. FRQs love to ask you to calculate the unemployment rate, inflation rate, or GDP deflator. Know your formulas cold.'},
  {id:3,emoji:'📉',tagline:'What causes booms and busts — and what can the government do?',intro:'Unit 3 is the biggest, most heavily tested unit in AP Macro. This is where everything comes together: the AS/AD model shows how the whole economy works in one graph, and fiscal policy is what the government does when things go wrong.',sections:[{title:'The AS/AD model — the economy in one graph',body:'**Aggregate Demand (AD)** slopes down. **Short-Run AS (SRAS)** slopes up. **Long-Run AS (LRAS)** is vertical — in the long run, output is fixed at potential GDP. Where AD meets SRAS is your short-run equilibrium. A positive demand shock raises both output and prices. A negative supply shock causes **stagflation** — higher prices AND lower output at the same time.'},{title:'The multiplier — small changes, big effects',body:'When the government spends $1, it doesn\'t just add $1 to GDP. That dollar becomes income → someone spends 80 cents → that becomes income → and so on. The **spending multiplier** = 1 ÷ MPS. The **tax multiplier** = −MPC ÷ MPS — always one less (in absolute value) than the spending multiplier.'},{title:'Fiscal policy — the government\'s toolkit',body:'**Expansionary** (fighting recession): increase spending, cut taxes → AD shifts right. **Contractionary** (fighting inflation): cut spending, raise taxes → AD shifts left. **Automatic stabilizers** like unemployment insurance do this automatically without any new legislation.'},{title:'Long-run self-correction',body:'In a recessionary gap, wages eventually fall → SRAS shifts right → back to full employment. In an inflationary gap, wages eventually rise → SRAS shifts left → back to full employment. This self-correction takes time — which is why policymakers don\'t always want to wait for it.'}],examTip:'Unit 3 is 17–27% of the exam and the heart of every FRQ. You must draw the AS/AD model, show shifts, identify gaps, and explain policy responses — all in one connected answer.'},
  {id:4,emoji:'🏦',tagline:'Where money comes from and how the Fed controls it.',intro:'You probably think money just... exists. But most of the money in the economy was actually created by banks — through lending. Unit 4 explains how that works, what the Federal Reserve does about it, and why interest rates are the most-watched number in finance.',sections:[{title:'What is money, really?',body:'Money is anything widely accepted as payment. **M1** = cash + checking accounts. **M2** adds savings accounts and money market funds. The monetary base is reserves + currency — not money itself, but the raw material banks use to create it.'},{title:'T-accounts — how banks see the world',body:'Every transaction has two sides. Assets on the left (cash, loans, reserves), liabilities on the right (deposits). When you deposit $100, the bank\'s assets go up (it has your cash as reserves) and liabilities go up (it owes you $100). **Assets always equal Liabilities + Equity.** Always.'},{title:'The money multiplier — how banks create money',body:'With a 10% reserve requirement, a $1,000 deposit keeps $100 and lends $900. That $900 gets deposited, keeping $90 and lending $810. The pattern continues: **Money Multiplier = 1 ÷ Reserve Requirement**. With 10% reserves, $1,000 can ultimately create $10,000 in the money supply.'},{title:'The Fed\'s toolkit',body:'**Open market operations** (buying/selling bonds) are the most common tool. Buy bonds → more money → expansionary. The **discount rate** is what the Fed charges banks to borrow. Lower it → expansionary. **Reserve requirements** are rarely changed. Today the Fed primarily uses the **interest on reserves (IOR)** rate.'}],examTip:'Unit 4 is 18–23% of the exam. Know T-accounts cold — the FRQ often gives you a deposit and asks you to trace through the banking system. Practice the money market and loanable funds graphs.'},
  {id:5,emoji:'📈',tagline:'What happens in the long run when policy goes wrong — or right?',intro:'Unit 5 is where short-run thinking meets long-run reality. Policies that feel good today can have painful side effects later. The Phillips Curve, crowding out, and the Quantity Theory of Money all answer one underlying question: what happens to the economy over time?',sections:[{title:'The Phillips Curve — inflation vs unemployment',body:'In the short run, there\'s a tradeoff: lower unemployment tends to mean higher inflation. The **Short-Run Phillips Curve (SRPC)** shows this. But in the long run, the **LRPC is vertical** at the natural rate. You can\'t permanently buy lower unemployment with higher inflation. The SRPC mirrors the SRAS — they shift together.'},{title:'Crowding out — the dark side of deficit spending',body:'When the government runs a deficit it borrows — entering the loanable funds market. More demand → real interest rates rise → private investment falls — it gets **crowded out**. A budget surplus does the reverse: **crowding in** → lower rates → more private investment.'},{title:'The Quantity Theory of Money',body:'**M × V = P × Y**. Money supply × velocity = price level × real output = nominal GDP. If M doubles and V and Y stay constant, P must double — inflation. This is why excessive money printing causes inflation.'},{title:'Long-run economic growth',body:'Real growth means shifting LRAS to the right. Drivers: more resources, better technology, improved productivity. Government can accelerate this with R&D funding, investment tax credits, education, and deregulation. On the PPC, this means the whole curve shifts outward.'}],examTip:'Unit 5 is 20–30% of the exam — the highest weight. Know Phillips Curve shifts, explain crowding out in the loanable funds graph, and connect fiscal/monetary policy to long-run outcomes.'},
  {id:6,emoji:'🌍',tagline:'How countries trade, borrow, and set exchange rates.',intro:'The final unit zooms out to the global economy. When the Fed raises interest rates, what happens to the dollar? When the US runs a trade deficit, where does that money go? Unit 6 connects everything to the international stage — and it shows up on every AP Macro exam.',sections:[{title:'The balance of payments — keeping score globally',body:'Every international transaction is recorded in the **balance of payments**. The **current account** tracks trade in goods, services, and income. The **capital and financial account** tracks purchases of assets. Golden rule: **Current Account + Capital Account = 0**. A trade deficit must be offset by capital inflows.'},{title:'Exchange rates — the price of money',body:'If the dollar **appreciates** (gets stronger), imports get cheaper but US exports get pricier abroad → net exports fall → AD shifts left. If the dollar **depreciates**, exports boom and imports shrink → net exports rise → AD shifts right.'},{title:'The interest rate → exchange rate chain',body:'This is tested on almost every FRQ: **Fed raises rates → US assets more attractive → demand for dollars rises → dollar appreciates → imports rise, exports fall → net exports fall → AD shifts left**. Draw this chain and you can answer almost any Unit 6 question.'}],examTip:'Unit 6 is 10–13% of the exam but heavily weighted in FRQs. The exchange rate/interest rate chain is almost guaranteed to appear. Practice the forex market graph.'},
];

function loadSessions(){try{return JSON.parse(localStorage.getItem('apex-sessions')||'[]')}catch{return[]}}
function saveSessions(s){try{localStorage.setItem('apex-sessions',JSON.stringify(s))}catch{}}

function detectUnit(s){
  const text=[s.title,s.summary,...(s.studyGuide?.keyTakeaways||[]),...(s.studyGuide?.sections||[]).map(x=>x.title+' '+(x.cards||[]).map(c=>c.title).join(' '))].join(' ').toLowerCase();
  let best=null,bestScore=0;
  for(const u of UNITS){const score=u.topics.filter(t=>text.includes(t)).length;if(score>bestScore){bestScore=score;best=u;}}
  return best||UNITS[3];
}

let sessions=loadSessions().map(s=>s.unit?s:{...s,unit:detectUnit(s)});
let currentSession=null,currentTab='visual',homeTab='sessions';
let flipped={},picks={},checked={},chatHistory=[];

async function callClaude(messages,system){
  if(!API_KEY){showSetup('Please enter your API key to continue.');throw new Error('No key');}
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:4000,system,messages})
  });
  if(res.status===401){localStorage.removeItem('apex-key');API_KEY='';showSetup('❌ Invalid API key — please enter a valid key from console.anthropic.com');throw new Error('401');}
  if(!res.ok)throw new Error(`API ${res.status}: ${(await res.text()).slice(0,200)}`);
  return (await res.json()).content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function bold(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong style="color:#eeeef5">$1</strong>')}
function render(html){document.getElementById('app').innerHTML=html}

// ── SETUP ──────────────────────────────────────────────────────────────────
function showSetup(err=''){
  render(`<div class="setup-box">
    <div class="mono-label" style="color:var(--a0);margin-bottom:12px">Setup — One time only</div>
    <div style="font-family:monospace;font-size:24px;font-weight:900;letter-spacing:2px;color:var(--txt);margin-bottom:20px">API KEY</div>
    ${err?`<div style="background:rgba(251,113,133,0.08);border:1px solid rgba(251,113,133,0.3);border-radius:4px;padding:10px 14px;color:var(--a4);font-size:13px;margin-bottom:14px">${esc(err)}</div>`:''}
    <div class="setup-steps">
      <strong style="color:var(--a1)">How to get your key:</strong><br>
      1. Go to <a href="https://console.anthropic.com" target="_blank" style="color:var(--a1)">console.anthropic.com</a><br>
      2. Click <strong style="color:var(--txt)">API Keys</strong> in the sidebar → <strong style="color:var(--txt)">Create Key</strong><br>

async function generate(){
  const tx=document.getElementById('tx')?.value?.trim();
  if(!tx)return;
  document.getElementById('gen-btn').disabled=true;
  document.getElementById('loading').style.display='flex';
  document.getElementById('gen-err').textContent='';
  try{
    const sys=`You are an expert AP Macroeconomics tutor. Given a lecture transcript, respond ONLY with valid JSON — no markdown, no fences. Structure:
{"title":"short title","summary":"2-3 sentence summary","studyGuide":{"keyTakeaways":["...","...","...","..."],"sections":[{"title":"Section Title","cards":[{"label":"label","title":"Card Title","bullets":["bullet with **bold** terms"]},{"label":"label","title":"Card Title","text":"prose with **bold** terms"}],"formulas":[{"eq":"formula","label":"description"}]}],"formulas":[{"eq":"formula","label":"description"}]},"flashcards":[{"term":"...","definition":"...","example":"..."}],"quiz":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"..."}],"resources":[{"name":"...","url":"...","why":"..."}]}
Rules: 2-3 sections, 2-3 cards each, 4 keyTakeaways, 3-5 global formulas, 6 flashcards, 5 quiz questions (answer=single letter), 3 resources.`;
    const raw=await callClaude([{role:'user',content:`Transcript:\n${tx.slice(0,6000)}`}],sys);
    const parsed=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());
    const s={id:Date.now(),date:new Date().toLocaleDateString(),transcript:tx,...parsed};
    s.unit=detectUnit(s);
    sessions.unshift(s);saveSessions(sessions);openSession(0);
  }catch(e){
    if(e.message!=='401'&&e.message!=='No key'){document.getElementById('gen-err').textContent='Error: '+e.message;}
    document.getElementById('gen-btn').disabled=false;
    document.getElementById('loading').style.display='none';
  }
}

function renderVisual(sg){

          <p style="font-size:13px;color:var(--soft);line-height:1.65;margin:0">${esc(t)}</p>
        </div>`).join('')}
      </div>
    </div>`:'';
  const secs=sections.map((sec,si)=>{
    const a=ac(si);
    return`<div style="margin-bottom:32px">
      <div class="section-header">
        <span class="section-num" style="color:${a}">${String(si+1).padStart(2,'0')}</span>

            <div style="font-size:14px;font-weight:600;color:var(--txt);margin-bottom:10px">${esc(card.title)}</div>
            ${card.bullets?`<ul class="bullets">${card.bullets.map(b=>`<li><span>${bold(b)}</span></li>`).join('')}</ul>`:`<p style="font-size:12px;color:var(--soft);line-height:1.7;margin:0">${bold(card.text)}</p>`}
          </div>`).join('')}
      </div>
      ${(sec.formulas||[]).map(f=>`<div class="formula" style="border-left:3px solid ${a};color:${a}">${esc(f.eq)}${f.label?`<span> — ${esc(f.label)}</span>`:''}</div>`).join('')}
    </div>`;
  }).join('');
  const cheat=formulas.length?`
    <div style="padding-top:28px;border-top:2px solid var(--bdr)">
      <div style="font-family:monospace;font-size:16px;font-weight:800;letter-spacing:3px;color:var(--a0);margin-bottom:14px">FORMULA CHEAT SHEET</div>

  return takeaways+secs+cheat;

function flipCard(i){

// ── QUIZ ───────────────────────────────────────────────────────────────────
function renderQuiz(quiz){
  return`<div class="mono-label" style="margin-bottom:16px">${quiz?.length} Questions</div>
  ${(quiz||[]).map((q,i)=>`
    <div class="card" style="border-left:3px solid ${ac(i)};margin-bottom:16px;padding:18px 20px">
      <p style="font-weight:600;font-size:14px;color:var(--txt);line-height:1.55;margin-bottom:14px">${i+1}. ${esc(q.question)}</p>
      <div>${(q.options||[]).map((opt,oi)=>`<div id="opt-${i}-${oi}" class="quiz-opt" onclick="pickOpt(${i},'${opt[0]}')">${esc(opt)}</div>`).join('')}</div>
      <div id="cb-${i}"><button class="btn-gold" style="display:none;margin-top:10px;font-size:12px;padding:7px 16px" id="cbtn-${i}" onclick="checkAnswer(${i},'${q.answer}','${encodeURIComponent(q.explanation)}')">Check Answer</button></div>
      <div id="exp-${i}" style="display:none;font-size:12px;color:var(--soft);border-top:1px solid var(--bdr);padding-top:12px;margin-top:12px;line-height:1.7"></div>
    </div>`).join('')}`;
}
function pickOpt(qi,letter){
  if(checked[qi])return;
  picks[qi]=letter;
  document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach((el,oi)=>{
    const l='ABCD'[oi];
    el.style.background=l===letter?'rgba(79,195,247,0.1)':'transparent';
    el.style.borderColor=l===letter?'#4fc3f7':'var(--bdr)';
    el.style.color=l===letter?'#4fc3f7':'var(--soft)';
  });
  const btn=document.getElementById(`cbtn-${qi}`);
  if(btn)btn.style.display='inline-block';
}
function checkAnswer(qi,correct,expEnc){
  checked[qi]=true;const chosen=picks[qi];
  document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach((el,oi)=>{
    const l='ABCD'[oi];
    if(l===correct){el.style.background='rgba(52,211,153,0.1)';el.style.borderColor='#34d399';el.style.color='#34d399';}
    else if(l===chosen&&l!==correct){el.style.background='rgba(251,113,133,0.1)';el.style.borderColor='#fb7185';el.style.color='#fb7185';}
    el.classList.add('locked');el.style.cursor='default';
  });
  const btn=document.getElementById(`cbtn-${qi}`);if(btn)btn.style.display='none';
  const exp=document.getElementById(`exp-${qi}`);
  if(exp){exp.style.display='block';exp.textContent=decodeURIComponent(expEnc);}
}

    <button class="btn-gold" onclick="sendChat()" style="padding:11px 20px">Send</button>
  </div>
  <div id="chat-busy" style="display:none;font-size:12px;color:var(--mut);font-style:italic;margin-top:8px">Thinking...</div>`;
}
async function sendChat(){
  const input=document.getElementById('chat-in');
  const msg=input?.value?.trim();if(!msg)return;input.value='';
  chatHistory.push({role:'user',content:msg});
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML+=`<div style="display:flex;justify-content:flex-end"><div class="chat-bubble-user">${esc(msg)}</div></div>`;
  const busy=document.getElementById('chat-busy');if(busy)busy.style.display='block';
  try{
    const sys=`You are an expert AP Macroeconomics tutor. Lecture summary: ${currentSession.summary}. Answer clearly in under 150 words, referencing the lecture and AP resources (Khan Academy, College Board, MRU) as relevant.`;
    const reply=await callClaude(chatHistory,sys);
    chatHistory.push({role:'assistant',content:reply});
    msgs.innerHTML+=`<div style="display:flex;justify-content:flex-start"><div class="chat-bubble-ai">${esc(reply)}</div></div>`;
  }catch(e){msgs.innerHTML+=`<div style="color:var(--a4);font-size:12px">${esc(e.message)}</div>`;}
  if(busy)busy.style.display='none';
  msgs.scrollTop=msgs.scrollHeight;
}

// ── RESOURCES ──────────────────────────────────────────────────────────────
function renderResources(resources){
  return`<div class="mono-label" style="margin-bottom:14px">Curated Resources</div>
  ${(resources||[]).map((r,i)=>`
    <div class="card" style="border-left:3px solid ${ac(i)};margin-bottom:12px">
      <a href="${esc(r.url)}" target="_blank" style="font-weight:600;font-size:15px;color:${ac(i)};letter-spacing:.3px">${esc(r.name)}</a>
      <p style="margin:6px 0 4px;font-size:13px;color:var(--soft);line-height:1.6">${esc(r.why)}</p>
      <p style="margin:0;font-size:11px;color:var(--mut);font-family:monospace">${esc(r.url)}</p>
    </div>`).join('')}`;
}

// ── NOTION ─────────────────────────────────────────────────────────────────
function buildNotionText(s){
  return['Please save this study session to Notion as a structured page.',
    `Title: ${s.title} — AP Macro [${s.date}]`,`Summary: ${s.summary}`,
    '','KEY TAKEAWAYS:',...(s.studyGuide?.keyTakeaways||[]).map((t,i)=>`${i+1}. ${t}`),
    '','SECTIONS:',...(s.studyGuide?.sections||[]).flatMap(sec=>[`## ${sec.title}`,...(sec.cards||[]).map(c=>`- ${c.title}: ${c.bullets?.join('; ')||c.text||''}`),...(sec.formulas||[]).map(f=>`Formula: ${f.eq} — ${f.label||''}`)]),
    '','FORMULAS:',...(s.studyGuide?.formulas||[]).map(f=>`${f.eq} — ${f.label||''}`),
    '','FLASHCARDS:',...(s.flashcards||[]).map((f,i)=>`${i+1}. ${f.term}: ${f.definition}`),
    '','QUIZ:',...(s.quiz||[]).map((q,i)=>`${i+1}. ${q.question} [${q.answer}] ${q.explanation}`),
    '','RESOURCES:',...(s.resources||[]).map(r=>`- ${r.name}: ${r.url} — ${r.why}`),
  ].join('\n');
}

// ── INIT ────────────────────────────────────────────────────────────────────
if(!API_KEY)showSetup();else showHome();
</script>
</body>
